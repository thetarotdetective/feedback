name: Narrative Feedback
description: Story beats, dialogue, character reactions, choice weight
title: "[Narrative] "
labels: ["narrative", "vol-0"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for playing. Tell us what landed — and what did not.
  - type: dropdown
    id: volume
    attributes:
      label: Which release?
      options:
        - "Volume 0: The Hanged Man's Daughter"
    validations:
      required: true
  - type: input
    id: scene
    attributes:
      label: Which scene or moment?
      description: Node name, choice text, or just describe where you were in the story.
      placeholder: "e.g. The reading at Zara's parlor / after the second tarot draw"
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the moment as you experienced it.
      placeholder: "I chose X and expected Y, but got Z instead..."
    validations:
      required: true
  - type: textarea
    id: what_felt
    attributes:
      label: What did it feel like?
      description: Did it land? Did something feel off? Did a character ring true?
      placeholder: "The dialogue felt too on-the-nose / I did not buy that Vera would say that / this choice felt like it had real weight..."
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: If you could change one thing here, what would it be?
      description: Optional. No wrong answers.
  - type: input
    id: itch_username
    attributes:
      label: Your itch.io username (for free key)
      description: Optional — leave this to claim a free key for the next release.
      placeholder: your-itch-username
