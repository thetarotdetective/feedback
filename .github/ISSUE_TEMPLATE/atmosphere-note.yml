name: Atmosphere Note
description: Visuals, audio, UI, the overall vibe of a scene
title: "[Atmosphere] "
labels: ["atmosphere", "vol-0"]
body:
  - type: markdown
    attributes:
      value: |
        Atmosphere is half the case. Tell us what the city felt like.
  - type: dropdown
    id: volume
    attributes:
      label: Which release?
      options:
        - "Volume 0: The Hanged Man's Daughter"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: What kind of atmosphere note is this?
      options:
        - Visuals / art
        - Audio / music / sound effects
        - UI / layout / readability
        - Overall scene vibe
        - Pacing
    validations:
      required: true
  - type: input
    id: scene
    attributes:
      label: Which scene?
      placeholder: "e.g. Opening / Morgue visit / Final confrontation"
  - type: textarea
    id: observation
    attributes:
      label: What did you notice?
      description: Describe what you experienced and how it made you feel.
      placeholder: "The music cut out at the wrong moment / the visuals for this scene did not match the tone of the prose / I felt like the UI was fighting me here..."
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: What would have felt right?
      description: Optional — gut feeling is fine.
  - type: input
    id: itch_username
    attributes:
      label: Your itch.io username (for free key)
      description: Optional — leave this to claim a free key for the next release.
      placeholder: your-itch-username
